name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  SUPERADMIN_SERVICE_ACCOUNT: ${{ vars.SUPERADMIN_SERVICE_ACCOUNT }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'superadmin-jwt-secret' }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_SHA}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/designfoundry-ea-superadmin:${{ steps.meta.outputs.image_tag }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/designfoundry-ea-superadmin:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        shell: bash
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/designfoundry-ea-superadmin:${{ needs.build.outputs.image_tag }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --service-account="${{ env.SUPERADMIN_SERVICE_ACCOUNT }}" \
            --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}" \
            --set-secrets="JWT_SECRET=${{ env.JWT_SECRET_NAME }}:latest" \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi \
            --cpu=1 \
            --port=3000 \
            --allow-unauthenticated

      - name: Get Cloud Run URL
        id: url
        shell: bash
        run: |
          URL=$(gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.GCP_REGION }}" \
            --format="value(status.url)")
          echo "service_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Super Admin — Production Deploy"
            echo "- Image tag: ${{ needs.build.outputs.image_tag }}"
            echo "- Service URL: ${{ steps.url.outputs.service_url }}"
            echo "- API URL: ${{ env.NEXT_PUBLIC_API_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
