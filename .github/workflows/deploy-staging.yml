name: Deploy Staging

on:
  # Manual trigger only — no auto-deploy on push to develop
  # Push to develop for code review/CI checks, trigger manually when ready to deploy
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image/artifact tag override (defaults to current SHA)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  package:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image tarball
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: designfoundry-ea-superadmin:${{ steps.meta.outputs.image_tag }}
          outputs: type=docker,dest=/tmp/designfoundry-ea-superadmin.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.STAGING_NEXT_PUBLIC_API_URL || 'http://localhost:3001/api/v1' }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: designfoundry-ea-superadmin-image-${{ steps.meta.outputs.image_tag }}
          path: /tmp/designfoundry-ea-superadmin.tar
          retention-days: 7

  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: designfoundry-ea-superadmin-image-${{ needs.package.outputs.image_tag }}
          path: /tmp/artifacts

      - name: Deploy to Cloud Run via provider adapter
        uses: ./.github/actions/deploy-gcp
        with:
          environment_name: staging
          image_tag: ${{ needs.package.outputs.image_tag }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_region: ${{ vars.GCP_REGION }}
          artifact_registry_repo: ${{ vars.ARTIFACT_REGISTRY_REPO }}
          cloud_run_service: ${{ vars.CLOUD_RUN_SERVICE }}
          service_account: ${{ vars.SUPERADMIN_SERVICE_ACCOUNT }}
          next_public_api_url: ${{ vars.STAGING_NEXT_PUBLIC_API_URL || 'http://localhost:3001/api/v1' }}
          jwt_secret_name: ${{ vars.JWT_SECRET_NAME || 'superadmin-jwt-secret' }}
          gcp_workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_deployer_service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Get service URL
        id: url
        shell: bash
        run: |
          echo "service_url=$(gcloud run services describe '${{ vars.CLOUD_RUN_SERVICE }}' --region='${{ vars.GCP_REGION }}' --format='value(status.url)' --project='${{ vars.GCP_PROJECT_ID }}')" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Super Admin — Staging Deploy"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Image tag: ${{ needs.package.outputs.image_tag }}"
            echo "- Service URL: ${{ steps.url.outputs.service_url }}"
            echo "- API URL: ${{ vars.STAGING_NEXT_PUBLIC_API_URL || 'http://localhost:3001/api/v1' }}"
          } >> "$GITHUB_STEP_SUMMARY"
