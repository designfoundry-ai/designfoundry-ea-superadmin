name: Deploy to GCP
description: Build, push to Artifact Registry, and deploy to Cloud Run
inputs:
  google_cloud_credentials:
    description: JSON credentials for Google Cloud
    required: true
  google_cloud_workload_identity_provider:
    description: Workload Identity Provider resource path
    required: true
  google_cloud_service_account:
    description: Service account to impersonate
    required: true
  artifact_registry_repo:
    description: Artifact Registry repository (e.g. superadmin)
    required: true
  region:
    description: GCP region
    required: true
  project_id:
    description: GCP project ID
    required: true
  cloud_run_service:
    description: Cloud Run service name
    required: true
  runtime_service_account:
    description: Service account for Cloud Run runtime
    required: true
  next_public_api_url:
    description: Next public API URL
    required: false
    default: ""
  jwt_secret_name:
    description: JWT secret name in Secret Manager
    required: false
    default: "superadmin-jwt-secret"

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.google_cloud_workload_identity_provider }}
        service_account: ${{ inputs.google_cloud_service_account }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.region }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        tags: |
          ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.artifact_registry_repo }}/designfoundry-ea-superadmin:${{ steps.meta.outputs.image_tag }}
          ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.artifact_registry_repo }}/designfoundry-ea-superadmin:latest
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NEXT_PUBLIC_API_URL=${{ inputs.next_public_api_url }}

    - name: Deploy to Cloud Run
      shell: bash
      run: |
        gcloud run deploy "${{ inputs.cloud_run_service }}" \
          --image="${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/${{ inputs.artifact_registry_repo }}/designfoundry-ea-superadmin:${{ steps.meta.outputs.image_tag }}" \
          --region="${{ inputs.region }}" \
          --platform=managed \
          --service-account="${{ inputs.runtime_service_account }}" \
          --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=${{ inputs.next_public_api_url }}" \
          --set-secrets="JWT_SECRET=${{ inputs.jwt_secret_name }}:latest" \
          --min-instances=0 \
          --max-instances=2 \
          --memory=512Mi \
          --cpu=1 \
          --port=3000 \
          --allow-unauthenticated

    - name: Get Cloud Run URL
      id: url
      shell: bash
      run: |
        URL=$(gcloud run services describe "${{ inputs.cloud_run_service }}" \
          --region="${{ inputs.region }}" \
          --format="value(status.url)")
        echo "service_url=$URL" >> "$GITHUB_OUTPUT"
